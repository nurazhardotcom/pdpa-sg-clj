name: Dependency Vulnerability Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  nvd-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          clj: 'latest'

      - name: Generate project classpath
        run: clojure -Spath > /tmp/classpath.txt

      - name: Run nvd-clojure dependency check
        run: |
          clojure -Sdeps '{:deps {nvd-clojure/nvd-clojure {:mvn/version "RELEASE"}}}' \
            -M -m nvd-clojure.nvd-clojure \
            :classpath-file /tmp/classpath.txt \
            :report-dir target/nvd-report
        continue-on-error: true

      - name: Upload NVD report
        uses: actions/upload-artifact@v4
        with:
          name: nvd-report
          path: target/nvd-report
