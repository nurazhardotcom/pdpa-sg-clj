name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Babashka
        run: bash <(curl -s https://raw.githubusercontent.com/babashka/babashka/master/install)
      - name: Show versions
        run: bb --version
      - name: Run tests
        run: bb test
